<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Insight — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: #161816;
      color: #f0f2f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; opacity: 0.6; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.9rem; color: #898b89; margin-bottom: 2rem; max-width: 300px; line-height: 1.5; }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #22c55e;
      color: #161816;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .retry-btn:hover { background: #16a34a; }
    .features {
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .feature {
      font-size: 0.8rem;
      color: #6a6c6a;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>Insight needs a connection to your local server to load data. Please check your network and try again.</p>
  <button class="retry-btn" onclick="window.location.reload()">
    ↻ Try again
  </button>
  <div class="features">
    <div class="feature"><span class="dot"></span> Your data is stored safely in PocketBase</div>
    <div class="feature"><span class="dot"></span> The app will reconnect automatically</div>
    <div class="feature"><span class="dot"></span> No data is lost while offline</div>
  </div>
  <script>
    // Auto-reload when coming back online
    window.addEventListener('online', () => window.location.reload());
    // Poll every 5 seconds
    setInterval(() => {
      if (navigator.onLine) window.location.reload();
    }, 5000);
  </script>
</body>
</html>
